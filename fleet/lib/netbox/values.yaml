nameOverride: netbox
clusterDomain: cluster.local

superuser:
  name: admin
  email: admin@lsst.org
  existingSecret: netbox-secrets


allowedHosts:
  - netbox.${ get .ClusterLabels "management.cattle.io/cluster-display-name" }.${ .ClusterLabels.site }.lsst.org

allowedHostsIncludesPodIP: false

admins:
  - [Admin User, admin@tudominio.com]

allowTokenRetrieval: false

changelogRetention: 90

debug: false

enforceGlobalUnique: true

graphQlEnabled: true

internalIPs: [127.0.0.1]

jobRetention: 90

loginRequired: false

loginTimeout: 1209600

maxPageSize: 1000

paginateCount: 50

secretKey: ZspyW4PeL9Nbo4rRznuNDKRUBJNGBbzwnidraj4m3mobekEbefPALeQjXKVz

timeZone: America/Santiago

replicaCount: 1

persistence:
  enabled: true
  storageClass: rook-ceph-block  # Ajusta según tu proveedor de almacenamiento
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

reportsPersistence:
  enabled: true
  storageClass: rook-ceph-block
  accessMode: ReadWriteOnce
  size: 1Gi
  annotations: {}

scriptsPersistence:
  enabled: true
  storageClass: rook-ceph-block
  accessMode: ReadWriteOnce
  size: 1Gi
  annotations: {}

resourcesPreset: medium
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

podSecurityContext:
  enabled: true
  fsGroup: 1000
  fsGroupChangePolicy: Always

securityContext:
  enabled: true
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  privileged: false
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  seccompProfile:
    type: RuntimeDefault

## @section Traffic Exposure Parameters

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 10m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
  hosts:
    - host: netbox.${ get .ClusterLabels "management.cattle.io/cluster-display-name" }.${ .ClusterLabels.site }.lsst.org
      paths:
        - /
  tls:
    - secretName: netbox-tls
      hosts:
        - netbox.${ get .ClusterLabels "management.cattle.io/cluster-display-name" }.${ .ClusterLabels.site }.lsst.org

valkey:
  enabled: true
  auth:
    existingSecret: netbox-valkey
    existingSecretPasswordKey: valkey-password

## @section Worker for Netbox parameters

worker:
  enabled: true
  replicaCount: 1
  resourcesPreset: medium
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  podSecurityContext:
    enabled: true
    fsGroup: 1000
    fsGroupChangePolicy: Always
  securityContext:
    enabled: true
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    privileged: false
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault

## @section Cron housekeeping job parameters

housekeeping:
  enabled: true
  schedule: 0 0 * * *
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  resourcesPreset: medium
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

extraEnvs:
  - name: DB_WAIT_DEBUG
    value: "1"

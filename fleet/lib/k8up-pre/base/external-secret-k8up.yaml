apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: k8up-secrets
  namespace: k8up
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: k8up-secrets
    creationPolicy: Owner
  data:
    - secretKey: access_key
      remoteRef:
        key: k8up-credentials
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: k8up-credentials
        property: secret_key

k8up:
  envVars:
    - name: k8up
      valueFrom:
        secretKeyRef:
          name: k8up-credentials
          key: access-key-id

  timezone: "America/Santiago"

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 20m
    memory: 128Mi

metrics:
  serviceMonitor:
    enabled: true
    additionalLabels:
      lsst.io/monitor: "true"

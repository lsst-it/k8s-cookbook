---
defaultNamespace: &name fluent-bit-kube
labels:
  bundle: *name
namespaceLabels:
  lsst.io/discover: "true"
helm:
  chart: &chart fluent-bit
  releaseName: *name
  repo: https://fluent.github.io/helm-charts
  version: 0.49.0
  timeoutSeconds: 600
  waitForJobs: true
  valuesFiles:
    - values.yaml
dependsOn:
  - selector:
      matchLabels:
        bundle: fluent-bit-kube-pre
targetCustomizations:
  - name: kueyen
    clusterSelector:
      matchExpressions:
        - key: management.cattle.io/cluster-display-name
          operator: In
          values:
            - kueyen
    helm:
      valuesFiles:
        - overlays/kueyen/values.yaml
  - name: ayekan
    clusterSelector:
      matchExpressions:
        - key: management.cattle.io/cluster-display-name
          operator: In
          values:
            - ayekan
    helm:
      valuesFiles:
        - overlays/ayekan/values.yaml
  - name: ruka
    clusterSelector:
      matchExpressions:
        - key: management.cattle.io/cluster-display-name
          operator: In
          values:
            - ruka
    helm:
      valuesFiles:
        - overlays/ruka/values.yaml

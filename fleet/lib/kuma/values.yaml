---
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: kuma.${ .ClusterLabels.site }.lsst.org
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: kuma-tls
      hosts:
        - kuma.${ .ClusterLabels.site }.lsst.org

volume:
  enabled: true
  accessMode: ReadWriteOnce
  size: 4Gi
  existingClaim: ""

resources:
  limits:
    cpu: "2"
    memory: 8Gi
  requests:
    cpu: "2"
    memory: 8Gi

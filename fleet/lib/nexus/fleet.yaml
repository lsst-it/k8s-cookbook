---
defaultNamespace: nexus
labels:
  bundle: &name nexus
helm:
  chart: *name
  releaseName: *name
  repo: https://stevehipwell.github.io/helm-charts/
  version: 4.41.1
  valuesFiles:
    - values.yaml
  timeoutSeconds: 900
  waitForJobs: true
  atomic: false
dependsOn:
  - selector:
      matchLabels:
        bundle: nexus-conf

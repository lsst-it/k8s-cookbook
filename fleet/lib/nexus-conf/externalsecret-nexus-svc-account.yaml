---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nexus-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  data:
    - secretKey: username
      remoteRef:
        key: nexus-repo-svc-account
        property: username
    - secretKey: password
      remoteRef:
        key: nexus-repo-svc-account
        property: password

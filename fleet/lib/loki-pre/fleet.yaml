---
defaultNamespace: loki
labels:
  bundle: &name loki-pre
namespaceLabels:
  lsst.io/discover: "true"
helm:
  releaseName: *name
  takeOwnership: true
  timeoutSeconds: 300
  waitForJobs: false
dependsOn:
  - selector:
      matchLabels:
        bundle: external-secrets
targetCustomizations:
  - name: antu
    clusterSelector:
      matchExpressions:
        - key: management.cattle.io/cluster-display-name
          operator: In
          values:
            - antu
    yaml:
      overlays:
        - antu
